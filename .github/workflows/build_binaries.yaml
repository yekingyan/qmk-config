name: Build Vial firmware

on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout userspace
        uses: actions/checkout@v4

      - name: Checkout vial-qmk
        uses: actions/checkout@v4
        with:
          repository: vial-kb/vial-qmk
          ref: vial
          path: vial-qmk
          submodules: recursive

      - name: Copy keyboard definitions into vial-qmk
        run: |
          # Dolphin52 (full keyboard definition)
          cp -r keyboards/dolphin52 vial-qmk/keyboards/dolphin52
          # Dolphin54 (full keyboard definition)
          cp -r keyboards/dolphin54 vial-qmk/keyboards/dolphin54

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install QMK CLI
        run: |
          python -m pip install --upgrade pip
          pip install qmk

      - name: QMK setup
        run: |
          cd vial-qmk
          qmk setup --yes --home .

      - name: Build Dolphin52 and Dolphin54 firmware
        run: |
          cd vial-qmk
          make dolphin52:vial
          make dolphin54:vial

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: dolphin52-vial-firmware
          path: |
            vial-qmk/*.uf2
